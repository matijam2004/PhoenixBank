services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank-app-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: ${MONGO_URI}
      DB_NAME: ${DB_NAME:-phoenix}

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI_LOGIN: ${GOOGLE_REDIRECT_URI_LOGIN:-}
      GOOGLE_REDIRECT_URI_SIGNUP: ${GOOGLE_REDIRECT_URI_SIGNUP:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173/}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      JWT_SECRET: ${JWT_SECRET:-dev-super-secret-change-me-in-production}
    networks:
      - bank-app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-}
        - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY:-}
    container_name: bank-app-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bank-app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  bank-app-network:
    driver: bridge
